<header class="app-header">
    <div class="app-header-left">
        <form class="app-header-form">
            <mat-form-field class="search-form-field" appearance="outline">
                <mat-label>Buscar</mat-label>
                <input matInput placeholder="Buscar" [formControl]="searchControl">

                @if (searchControl.value) {
                <button matSuffix mat-icon-button aria-label="Clear" (click)="appStore.resetFilters()">
                    <mat-icon>
                        <span class="material-symbols-outlined"> close </span>
                    </mat-icon>
                </button>
                }
            </mat-form-field>

        </form>
